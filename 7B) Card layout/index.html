<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Card Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page-container">
        
        <div class="card">
            <img src="https://picsum.photos/300/150?random=10" alt="Card Header" class="card-img">
            <div class="card-content">
                <h2>Flexbox Card</h2>
                <p>This is a modern card layout built using CSS Flexbox. It features a border, box-shadow, padding, and centered text as requested.</p>
                <button class="card-btn">Learn More</button>
            </div>
        </div>

    </div>

</body>
</html>
